            - generic [ref=e425]:
              - heading "About the job" [level=3] [ref=e426]
              - paragraph [ref=e427]: Google's software engineers develop the next-generation technologies that change how billions of users connect, explore, and interact with information and one another. Our products need to handle information at massive scale, and extend well beyond web search. We're looking for engineers who bring fresh ideas from all areas, including information retrieval, distributed computing, large-scale system design, networking and data storage, security, artificial intelligence, natural language processing, UI design and mobile; the list goes on and is growing every day. As a software engineer, you will work on a specific project critical to Google’s needs with opportunities to switch teams and projects as you and our fast-paced business grow and evolve. We need our engineers to be versatile, display leadership qualities and be enthusiastic to take on new problems across the full-stack as we continue to push technology forward.
              - paragraph [ref=e428]: The Sustainability Data and Tech team sits within Google's Global Sustainability Team, the central organization driving our company’s ambitious climate action, clean energy, and decarbonization goals. We focus on building a more sustainable future for everyone by driving strategy and catalyzing solutions at scale. Our team leads the engineering and development of solutions that enable smarter sustainability insights and decision-making across Alphabet. We collect, organize, and share critical sustainability data to empower Google’s operations and global climate impact strategies.
              - paragraph [ref=e429]: As a Software Engineer blending data engineering and software development expertise, you will build critical data solutions driving Google's climate action goals.
              - paragraph [ref=e430]: The Global Sustainability team enables Google to build a more sustainable future for everyone by driving strategy and solutions. We drive the development and implementation of Google’s global sustainability strategy to further empower action, ensure alignment and prioritization, identify leadership opportunities, and mitigate risks. We drive sustainability strategy and programs on carbon, circular economy, water, product integration, reporting, and employee engagement, while serving as a sustainability leadership advocate internally and externally.
              - text: Individual pay is determined by factors including job-related skills, experience, and relevant education or training.
              - text: "US: $147000 - $211000 (USD) + 15% bonus target + bonus + equity + benefits"
              - text: Learn more about
              - link "benefits at Google" [ref=e431] [cursor=pointer]:
                - /url: https://www.google.com/about/careers/applications/benefits/
              - text: .
            - generic [ref=e432]:
              - heading "Responsibilities" [level=3] [ref=e433]
              - list [ref=e434]:
                - listitem [ref=e435]: Write product or system development code to build and optimize scalable and efficient data pipelines, data integrations, and data mart solutions managing sustainability datasets.
                - listitem [ref=e436]: Participate in, or lead design reviews with peers and stakeholders to decide amongst available technologies, balancing long-term, scalable architecture design with the need for rapid iteration in a dynamic field.
                - listitem [ref=e437]: Review code developed by other developers and provide feedback to ensure best practices across both software and data domains.
                - listitem [ref=e438]: Contribute to existing documentation or educational content and adapt content based on product/program updates, helping to drive broader cross-Google sustainability engineering strategy and scaling impact.
                - listitem [ref=e439]: Triage product or system issues and debug/track/resolve by analyzing the sources of issues and the impact on hardware, network, or service operations and quality across our critical climate data applications.
