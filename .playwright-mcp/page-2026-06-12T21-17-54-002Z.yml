                - listitem [ref=e412]: 2 years of experience with data structures and algorithms.
                - listitem [ref=e413]: Experience developing accessible technologies.
            - generic [ref=e414]:
              - heading "About the job" [level=3] [ref=e415]
              - paragraph [ref=e416]: Google's software engineers develop the next-generation technologies that change how billions of users connect, explore, and interact with information and one another. Our products need to handle information at massive scale, and extend well beyond web search. We're looking for engineers who bring fresh ideas from all areas, including information retrieval, distributed computing, large-scale system design, networking and data storage, security, artificial intelligence, natural language processing, UI design and mobile; the list goes on and is growing every day. As a software engineer, you will work on a specific project critical to Google’s needs with opportunities to switch teams and projects as you and our fast-paced business grow and evolve. We need our engineers to be versatile, display leadership qualities and be enthusiastic to take on new problems across the full-stack as we continue to push technology forward.
              - paragraph [ref=e417]: In this role, AI/ML includes many different workflows like pre-training, training, reinforcement learning, inferencing, etc. You will be instrumental in building the next-generation of cloud storage, specifically tailored for extreme-scale, data-intensive workloads such as generative AI and real-time inference. You will join us in delivering industry-leading performance, with the service aiming for throughput up to 10TB/s, significantly surpassing performer offerings.
              - text: Google Cloud accelerates every organization’s ability to digitally transform its business and industry. We deliver enterprise-grade solutions that leverage Google’s cutting-edge technology, and tools that help developers build more sustainably. Customers in more than 200 countries and territories turn to Google Cloud as their trusted partner to enable growth and solve their most critical business problems.Individual pay is determined by factors including job-related skills, experience, and relevant education or training.
              - text: "US: $147000 - $211000 (USD) + 15% bonus target + bonus + equity + benefits"
              - text: Learn more about
              - link "benefits at Google" [ref=e418] [cursor=pointer]:
                - /url: https://www.google.com/about/careers/applications/benefits/
              - text: .
            - generic [ref=e419]:
              - heading "Responsibilities" [level=3] [ref=e420]
              - list [ref=e421]:
                - listitem [ref=e422]: Build and launch application programming interfaces for file systems.
                - listitem [ref=e423]: Design and implement distributed systems to deliver file systems at multi-petabyte scale.
                - listitem [ref=e424]: Develop file system technologies for data protection features like snapshots, backups, and security.
                - listitem [ref=e425]: Investigate bottlenecks, deliver performance improvements, and build customer-facing tools to achieve performance for specific scenarios.
                - listitem [ref=e426]: Implement optimizations to reduce cost.
