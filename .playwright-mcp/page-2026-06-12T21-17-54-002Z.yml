                - listitem [ref=e407]: 2 years of experience with developing large-scale infrastructure, distributed systems or storage systems.
                - listitem [ref=e408]: 2 years of experience with software development or 1 year of experience with an advanced degree in an industry setting.
              - heading "Preferred qualifications:" [level=3] [ref=e409]
              - list [ref=e410]:
