                    - listitem [ref=e399]: "Sick Time: 40 hours/year (increased to 69 hours/year for Seattle) including 5 discretionary sick days per instance"
                    - listitem [ref=e400]: "Maternity Leave (Short-Term Disability + Baby Bonding): 28-30 weeks"
