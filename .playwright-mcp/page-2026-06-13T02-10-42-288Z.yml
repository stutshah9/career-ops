              - list [ref=e391]:
                - listitem [ref=e392]: Bachelor’s degree in Computer Science, Engineering, Computer Information Systems, Mathematics, Physics, or a related field and 2 years of experience in the job offered or in a Software Engineer, Site Reliability-related occupation.
                - listitem [ref=e393]: "Position requires 2 years of experience in the following: Designing, writing, testing, and maintaining software applications; Selecting and designing algorithms and data structures to improve system scale, speed, and reliability; Troubleshooting and performing root cause analysis on large-scale distributed systems or Debugging large-scale distributed systems; Anticipating, assessing, and managing risks to systems and tools or System risk management; Simplifying or automating processes and systems or Workflow automation"
            - generic [ref=e394]:
              - heading "About the job" [level=3] [ref=e395]
              - paragraph [ref=e396]: Artificial Intelligence could be one of humanity’s most useful inventions. At Google DeepMind, we’re a team of scientists, engineers, machine learning experts and more, working together to advance the state of the art in artificial intelligence. We use our technologies for widespread public benefit and scientific discovery, and collaborate with others on critical challenges, ensuring safety and ethics are the highest priority.
              - paragraph [ref=e397]: We are pushing the boundaries across multiple domains. Our global teams offer diverse learning opportunities and varied career pathways for those driven to achieve exceptional results through collective effort.
              - paragraph [ref=e398]:
                - text: The US base salary range for this full-time position is $149,400 - $211,000 + 15% bonus target + equity + benefits determined by role, level, and location. Individual pay is determined by additional factors, including job-related skills, experience, and relevant education or training. Learn more about
                - link "benefits at Google" [ref=e399] [cursor=pointer]:
                  - /url: https://www.google.com/about/careers/applications/benefits/
                - text: .
              - paragraph [ref=e400]: Position reports to the Google Mountain View, CA office & may allow for a hybrid schedule as per Google policy.
            - generic [ref=e401]:
              - heading "Responsibilities" [level=3] [ref=e402]
              - list [ref=e403]:
                - listitem [ref=e404]: Develop and improve code for tools, libraries, and systems with a focus on reliability, scalability, and efficiency.
                - listitem [ref=e405]: Review code from other engineers to ensure adherence to best practices in style, accuracy, testability, and maintainability.
                - listitem [ref=e406]: Lead and participate in technical design reviews to select appropriate technologies and create simple, robust solutions.
                - listitem [ref=e407]: Triage and resolve system issues by debugging, analyzing root causes, and implementing preventative measures for operational quality.
                - listitem [ref=e408]: Create and maintain technical documentation and educational content, adapting it based on product updates and user feedback. Champion engineering best practices, contribute to community work like hiring, and drive the adoption of improved standards.
